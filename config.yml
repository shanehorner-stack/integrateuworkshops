# ---------------------------------------------------------------------
# THE THREE FEEDS your scout reads every morning.
#
# These are RSS feeds: special web addresses that news sites publish so
# programs can read their headlines. The three below are real national
# construction and housing feeds that work for anyone in the US, so you
# can leave them as-is and everything still works.
#
# To make your brief LOCAL: replace any line below with an RSS feed from
# your own city -- your business journal, your local news site, or your
# county's news page. Tip: search Google for "<your city> business
# journal RSS". Paste the address between the quotes, keep the dash.
# ---------------------------------------------------------------------
feeds:
  - "https://nahbnow.com/feed/"                        # National Assoc. of Home Builders news
  - "https://www.constructiondive.com/feeds/news/"     # Construction industry news
  - "https://www.housingwire.com/feed/"                # Housing market news
  - "https://rss.bizjournals.com/feed/122fd6c759daf3a88f52fb866b48ae559b692340/15320?market=cleveland&selectortype=channel&selectorvalue=1,6,2,3,4,13,17,5,9,10,18,7,11,12,14,15,8,16"

