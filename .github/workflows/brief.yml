name: Morning Brief

on:
  schedule:
    # 9:00 UTC = 5:00 AM Eastern during daylight saving time (which
    # covers the workshop in July). In winter this drifts to 4:00 AM
    # Eastern; edit the hour below if that bothers you.
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # the "Run workflow" button in the Actions tab

permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and send your brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python brief.py
